name: Nirwana Music CI/CD

on:
  push:
    branches: [ "1.0.1" ]
  workflow_dispatch:

jobs:
  build_and_cleanup:
    name: Build and Purge
    runs-on: ubuntu-latest

    steps:
      # 1. Environment Setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Private Clone
      - name: Clone Nirwana-Music
        run: |
          git clone --depth 1 --branch 1.0.1 https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/iamzeus14/Nirwana-Music.git .
          # Export metadata for the notification
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_ENV
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      # 3. Send Trigger Notification (Cosmic Style)
      - name: Send Trigger Notification
        run: |
          TIME=$(date +"%a %b %d %I:%M:%S %p")
          
          CAPTION=$(printf "<b>Build Triggered ⌛</b>\n\n<b>App : </b><code>Nirwana Music</code>\n<b>Support : </b><code>Android 13.0 - 16.0</code>\n<b>Variant : </b><code>Released</code>\n<b>Machine : </b><code>Ubuntu 24.04.3 LTS</code>\n<b>Cores : </b><code>4</code>\n<b>Time : </b><code>$TIME</code>\n<b>Top Commit : </b>${{ env.COMMIT_SHA }} <code>${{ env.COMMIT_MSG }}</code>")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 4. Prepare Gradle
      - name: Prepare Gradle
        run: |
          if [ ! -f gradlew ]; then gradle wrapper; fi
          chmod +x gradlew

      # 5. Build the Music App
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      # 6. Upload & Send Success (Cosmic Style)
      - name: Handle Success
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          
          # Uploading to transfer.sh for large file support
          DOWNLOAD_URL=$(curl --upload-file "$APK_PATH" "https://transfer.sh/$APK_NAME")
          
          # Calculate Duration
          NOW=$(date +%s)
          DIFF=$(( NOW - ${{ env.START_TIME }} ))
          DUR_MIN=$(( DIFF / 60 ))
          DUR_SEC=$(( DIFF % 60 ))
          
          CAPTION=$(printf "<b>Build Completed ✅</b>\n\n<b>App : </b><code>Nirwana Music</code>\n<b>File : </b><code>$APK_NAME</code>\n<b>Size : </b><code>86.5 MB</code>\n<b>Duration : </b><code>${DUR_MIN}m ${DUR_SEC}s</code>\n\n<b>Download Link : </b>\n$DOWNLOAD_URL")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 7. Handle Failure (Cosmic Style)
      - name: Handle Failure
        if: failure()
        run: |
          [ -f build_log.txt ] && tail -n 200 build_log.txt > error_trace.txt || echo "Build crashed early." > error_trace.txt
          
          CAPTION=$(printf "<b>Nirwana Music Build Failed</b>\n\n<b>Commit:</b> <code>${{ env.COMMIT_SHA }}</code>\n<i>Last 200 log lines attached</i>")

          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F document=@"error_trace.txt" \
               -F parse_mode="HTML" \
               -F caption="$CAPTION" \
               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"

      # 8. Cleanup
      - name: Purge Workspace
        if: always()
        run: |
          rm -rf ./*
          rm -rf .git
