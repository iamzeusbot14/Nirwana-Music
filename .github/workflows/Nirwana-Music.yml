name: Nirwana Music CI/CD

on:
  push:
    branches: [ "1.0.1" ]
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

# 🔐 REQUIRED for private repo access
permissions:
  contents: read

jobs:
  build_and_cleanup:
    name: Build and Purge
    runs-on: ubuntu-latest

    steps:
      # 1. Environment Setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ⚡ Cache Gradle (faster builds)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      # 2. Clone Private Repo ✅ FIXED
      - name: Clone Nirwana-Music
        run: |
          git clone --depth 1 --branch 1.0.1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/iamzeus14/Nirwana-Music.git .
          
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_ENV
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      # 3. Send Trigger Notification
      - name: Send Trigger Notification
        run: |
          TIME=$(date +"%a %b %d %I:%M:%S %p")
          
          CAPTION=$(printf "<b>Build Triggered ⌛</b>\n<b>App : </b><code>Nirwana Music</code>\n<b>Support : </b><code>Android 16.0</code>\n<b>Variant : </b><code>Release</code>\n<b>Machine : </b><code>Ubuntu</code>\n<b>Time : </b><code>$TIME</code>\n<b>Top Commit : </b><code>${{ env.COMMIT_SHA }}</code>\n<b>Msg : </b><code>${{ env.COMMIT_MSG }}</code>")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 4. Prepare Gradle
      - name: Prepare Gradle
        run: |
          if [ ! -f gradlew ]; then gradle wrapper; fi
          chmod +x gradlew

      # 5. Build APK
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      # 6. Handle Success
      - name: Handle Success
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          
          echo "🌐 Fetching GoFile server..."
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')

          echo "📤 Uploading $APK_NAME..."
          UPLOAD_RESPONSE=$(curl -F "file=@$APK_PATH" "https://$SERVER.gofile.io/contents/uploadfile")
          DOWNLOAD_URL=$(echo $UPLOAD_RESPONSE | jq -r '.data.downloadPage // "Upload Error"')
          
          NOW=$(date +%s)
          DIFF=$(( NOW - ${{ env.START_TIME }} ))
          
          CAPTION=$(printf "<b>Build Completed ✅</b>\n\n<b>App : </b><code>Nirwana Music</code>\n<b>File : </b><code>$APK_NAME</code>\n<b>Duration : </b><code>$(( DIFF / 60 ))m $(( DIFF % 60 ))s</code>\n\n<b>Download Link : </b>\n$DOWNLOAD_URL")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 7. Handle Failure
      - name: Handle Failure
        if: failure()
        run: |
          [ -f build_log.txt ] && tail -n 200 build_log.txt > error_trace.txt || echo "Build failed." > error_trace.txt
          
          CAPTION=$(printf "<b>Nirwana Music Build Failed ❌</b>\n\n<b>Commit:</b> <code>${{ env.COMMIT_SHA }}</code>\n<i>Last 200 log lines attached</i>")

          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F document=@"error_trace.txt" \
               -F parse_mode="HTML" \
               -F caption="$CAPTION" \
               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"

      # 8. Cleanup
      - name: Purge Workspace
        if: always()
        run: |
          rm -rf ./*
          rm -rf .git