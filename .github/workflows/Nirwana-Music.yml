name: Nirwana Music CI/CD

on:
  push:
    branches: [ "1.0.1" ]
  workflow_dispatch:

jobs:
  build_and_cleanup:
    name: Clone, Build, and Purge
    runs-on: ubuntu-latest

    steps:
      # 1. Environment Setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Manual Clone using your REPO_ACCESS_TOKEN
      - name: Clone Nirwana-Music
        run: |
          # We use the token in the URL to authenticate the private clone
          git clone --depth 1 --branch 1.0.1 https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/iamzeus14/Nirwana-Music.git .
          echo "✅ Repository cloned successfully."

      # 3. Handle Gradle Wrapper (Ensures gradlew exists)
      - name: Prepare Gradle
        run: |
          if [ ! -f gradlew ]; then
            echo "⚠️ gradlew not found. Generating..."
            gradle wrapper
          fi
          chmod +x gradlew

      # 4. Build the Music App
      - name: Build APK
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      # 5. Send APK to Telegram
      - name: Send APK to Telegram
        if: success()
        run: |
          # Locates the APK anywhere in the build outputs
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          curl -F document=@"$APK_PATH" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F caption="🎵 *Nirwana Music: Build Ready!*%0A📌 *Branch:* 1.0.1%0A👤 *By:* Z E U S" \
          -F parse_mode="Markdown"

      # 6. Send Error Log on Failure
      - name: Send Error Log
        if: failure()
        run: |
          [ -f build_log.txt ] && tail -n 200 build_log.txt > error_log.txt || echo "Clone or Build failed before logs were written." > error_log.txt
          curl -F document=@"error_log.txt" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F caption="❌ *Nirwana Music: Build Failed*%0ACheck the attached log for details." \
          -F parse_mode="Markdown"

      # 7. Final Purge (Zero Footprint)
      - name: Purge Workspace
        if: always()
        run: |
          # Deletes everything including the hidden .git folder
          rm -rf ./*
          rm -rf .git
          echo "✅ Runner workspace and artifacts completely purged."
