name: Nirwana Music CI/CD

on:
  push:
    branches: [ "1.0.1" ]
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build_and_cleanup:
    name: Build and Purge
    runs-on: ubuntu-latest

    steps:
      # 1. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      # 3. Checkout PRIVATE repo
      - name: Checkout Nirwana-Music
        uses: actions/checkout@v4
        with:
          repository: iamzeus14/Nirwana-Music
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: 1.0.1

      # 4. Get Commit Info
      - name: Get Commit Info
        run: |
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_MSG<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      # 5. Send Trigger Notification (FINAL FORMAT)
      - name: Send Trigger Notification
        run: |
          TIME=$(date +"%a %b %d %I:%M:%S %p")
          CORES=$(nproc)

          # Clean + trim commit message
          COMMIT_MSG_CLEAN=$(echo "${{ env.COMMIT_MSG }}" | head -n 1 | cut -c1-80)
          [ ${#COMMIT_MSG_CLEAN} -ge 80 ] && COMMIT_MSG_CLEAN="$COMMIT_MSG_CLEAN..."

          CAPTION=$(printf "<b>Build Triggered ⌛</b>\n<b>App :</b> <code>Nirwana Music</code>\n<b>Support :</b> <code>Android 16.0</code>\n<b>Variant :</b> <code>Released</code>\n<b>Machine :</b> <code>Ubuntu 24.04.3 LTS</code>\n<b>Cores :</b> <code>$CORES</code>\n<b>Time :</b> <code>$TIME</code>\n<b>Top Commit :</b> <b>${{ env.COMMIT_SHA }}</b> $COMMIT_MSG_CLEAN")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 6. Prepare Gradle
      - name: Prepare Gradle
        run: |
          if [ ! -f gradlew ]; then gradle wrapper; fi
          chmod +x gradlew

      # 7. Build APK
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      # 8. Handle Success
      - name: Handle Success
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          APK_NAME=$(basename "$APK_PATH")

          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')
          RESPONSE=$(curl -F "file=@$APK_PATH" "https://$SERVER.gofile.io/contents/uploadfile")
          DOWNLOAD_URL=$(echo $RESPONSE | jq -r '.data.downloadPage // "Upload Error"')

          NOW=$(date +%s)
          DIFF=$(( NOW - ${{ env.START_TIME }} ))

          CAPTION=$(printf "<b>Build Completed</b>\n<b>App :</b> <code>Nirwana Music</code>\n<b>File :</b> <code>$APK_NAME</code>\n<b>Duration :</b> <code>$(( DIFF / 60 ))m $(( DIFF % 60 ))s</code>\n<b>Download Link :</b>\n$DOWNLOAD_URL")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 9. Handle Failure
      - name: Handle Failure
        if: failure()
        run: |
          [ -f build_log.txt ] && tail -n 200 build_log.txt > error.txt || echo "Build failed" > error.txt

          CAPTION=$(printf "<b>Build Failed</b>\n<b>Commit :</b> <code>${{ env.COMMIT_SHA }}</code>\n<i>Last 200 log lines attached</i>")

          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F document=@"error.txt" \
               -F caption="$CAPTION" \
               -F parse_mode="HTML" \
               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"

      # 10. Cleanup
      - name: Cleanup
        if: always()
        run: |
          rm -rf ./*
          rm -rf .git