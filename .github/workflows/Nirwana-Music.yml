name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git curl jq

    - name: Clone Private Repo
      run: |
        git clone --depth 1 --branch 1.0.1 https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/iamzeus14/Nirwana-Music.git .

        echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_ENV
        echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

    - name: Send Build Trigger Message
      run: |
        CORES=$(nproc)
        TIME=$(TZ=Asia/Kolkata date +"%a %b %d %I:%M:%S %p")

        COMMIT_MSG_CLEAN=$(echo "${{ env.COMMIT_MSG }}" | cut -c1-80)
        [ ${#COMMIT_MSG_CLEAN} -ge 80 ] && COMMIT_MSG_CLEAN="$COMMIT_MSG_CLEAN..."

        TEXT=$(printf "<b>Build Triggered ⌛</b>\n<b>App :</b> <code>Nirwana Music</code>\n<b>Support :</b> <code>Android 16.0</code>\n<b>Variant :</b> <code>Released</code>\n<b>Machine :</b> <code>Ubuntu 24.04.3 LTS</code>\n<b>Cores :</b> <code>%s</code>\n<b>Time :</b> <code>%s</code>\n<b>Top Commit :</b> <b>%s</b> %s" "$CORES" "$TIME" "${{ env.COMMIT_SHA }}" "$COMMIT_MSG_CLEAN")

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="$TEXT"

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Handle Success (GoFile + Message)
      if: success()
      run: |
        APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)

        NOW=$(date +%s)
        DIFF=$(( NOW - ${{ env.START_TIME }} ))

        MIN=$(( DIFF / 60 ))
        SEC=$(( DIFF % 60 ))

        # MD5 checksum
        MD5=$(md5sum "$APK_PATH" | cut -d ' ' -f1)

        # Upload to GoFile
        SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')
        RESPONSE=$(curl -s -F "file=@$APK_PATH" "https://$SERVER.gofile.io/contents/uploadfile")
        DOWNLOAD_URL=$(echo $RESPONSE | jq -r '.data.downloadPage // "Upload Error"')

        # Final message (NO preview, only link + details)
        TEXT=$(printf "<b>Download :</b> %s\n\n<b>Build took :</b> %d minute(s) and %d second(s) | <b>MD5 Checksum :</b>\n<code>%s</code>" "$DOWNLOAD_URL" "$MIN" "$SEC" "$MD5")

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="$TEXT"

    - name: Handle Failure
      if: failure()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="<b>Build Failed</b>"