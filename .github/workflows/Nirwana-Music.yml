name: Nirwana Music CI/CD

on:
  push:
    branches: [ "1.0.1" ]
  workflow_dispatch:

jobs:
  build_and_cleanup:
    name: Build and Purge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find or Generate Gradle Wrapper
        run: |
          # Try to find existing gradlew
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "⚠️ gradlew not found. Generating a fresh one..."
            gradle wrapper
            GRADLEW_PATH="./gradlew"
          fi
          
          echo "GRADLEW_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV
          chmod +x "$GRADLEW_PATH"
          echo "✅ Gradle ready at: $GRADLEW_PATH"

      - name: Build Music App
        run: |
          cd ${{ env.GRADLEW_DIR }}
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      - name: Send APK to Telegram
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          curl -F document=@"$APK_PATH" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F caption="🎵 *Nirwana Music Ready!*%0A📌 *Branch:* 1.0.1" \
          -F parse_mode="Markdown"

      - name: Send Error Log
        if: failure()
        run: |
          LOG_FILE=$(find . -name "build_log.txt" | head -n 1)
          [ -f "$LOG_FILE" ] && tail -n 200 "$LOG_FILE" > error_log.txt || echo "No log found" > error_log.txt
          curl -F document=@"error_log.txt" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F caption="❌ *Build Failed on 1.0.1*" \
          -F parse_mode="Markdown"

      - name: Final Workspace Purge
        if: always()
        run: |
          rm -rf app/build/
          rm -f build_log.txt error_log.txt
          echo "✅ Workspace cleared."
