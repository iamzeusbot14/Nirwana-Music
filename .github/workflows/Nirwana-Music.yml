name: Nirwana Music CI/CD

on:
  push:
    branches: [ "main", "master", "dev" ]
  workflow_dispatch:

jobs:
  build_and_cleanup:
    name: Build, Deploy and Purge
    runs-on: ubuntu-latest

    steps:
      # 1. Critical: Checkout must happen first
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Debug: List files to verify they exist (check logs if build fails)
      - name: Verify Repository Content
        run: ls -R

      # 3. Setup Java (Now it will find the gradle files)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # We remove the 'cache: gradle' line temporarily if it's causing the error
          # Or keep it if the files are confirmed to be in the root

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Music App
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      - name: Send APK to Telegram on Success
        if: success()
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          curl -F document=@"$APK_PATH" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F caption="🎵 *Nirwana Music: Build Ready!*%0A%0A📌 *Trigger:* ${{ github.event_name }}%0A👤 *By:* ${{ github.actor }}" \
          -F parse_mode="Markdown"

      - name: Send Error Log on Failure
        if: failure()
        run: |
          [ -f build_log.txt ] && tail -n 200 build_log.txt > error_log.txt || echo "Build log not found" > error_log.txt
          curl -F document=@"error_log.txt" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F caption="❌ *Build Failed*%0ALogs attached." \
          -F parse_mode="Markdown"

      - name: Purge All Artifacts
        if: always()
        run: |
          rm -rf app/build/
          rm -f build_log.txt error_log.txt
          echo "✅ Workspace cleared."
