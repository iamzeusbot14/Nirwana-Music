name: Nirwana Music CI/CD

on:
  push:
    branches: [ "1.0.1" ]
  workflow_dispatch:

jobs:
  build_and_cleanup:
    name: Build and Purge
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clone Nirwana-Music
        run: |
          git clone --depth 1 --branch 1.0.1 https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/iamzeus14/Nirwana-Music.git .

      - name: Send Trigger Notification
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          TIME=$(date +"%a %b %d %I:%M:%S %p")
          
          # We use HTML to specifically bold the headers and the first part of the values
          MESSAGE="<b>Build Triggered ⌛</b>%0A"
          MESSAGE+="<b>App : </b><code>Nirwana Music</code>%0A"
          MESSAGE+="<b>Support : </b><code>Android 14.0+</code>%0A"
          MESSAGE+="<b>Variant : </b><code>Debug Stable</code>%0A"
          MESSAGE+="<b>Machine : </b><code>Ubuntu 24.04.3 LTS</code>%0A"
          MESSAGE+="<b>Cores : </b><code>4</code>%0A"
          MESSAGE+="<b>Time : </b><code>$TIME</code>%0A"
          MESSAGE+="<b>Top Commit : </b><code>$COMMIT_HASH $COMMIT_MSG</code>"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$MESSAGE" \
          -d parse_mode="HTML"

      - name: Prepare Gradle
        run: |
          if [ ! -f gradlew ]; then gradle wrapper; fi
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      - name: Upload and Send Link to Telegram
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          
          # Uploading to transfer.sh for large file support
          DOWNLOAD_URL=$(curl --upload-file "$APK_PATH" "https://transfer.sh/$APK_NAME")
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="✅ <b>Build Completed</b>%0A%0A📦 <b>File:</b> <code>$APK_NAME</code>%0A🔗 <b>Download:</b> $DOWNLOAD_URL" \
          -d parse_mode="HTML"

      - name: Send Error Log on Failure
        if: failure()
        run: |
          [ -f build_log.txt ] && tail -n 200 build_log.txt > error_log.txt || echo "Failed" > error_log.txt
          curl -F document=@"error_log.txt" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F caption="❌ <b>Build Failed on 1.0.1</b>" \
          -F parse_mode="HTML"

      - name: Purge Workspace
        if: always()
        run: |
          rm -rf ./*
          rm -rf .git
