name: Nirwana Music CI/CD

on:
  push:
    branches: [ "1.0.1" ]
  workflow_dispatch:

jobs:
  build_and_cleanup:
    name: Build and Purge
    runs-on: ubuntu-latest

    steps:
      # 1. Environment Setup
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Private Clone & Metadata Extraction
      - name: Clone Nirwana-Music
        run: |
          git clone --depth 1 --branch 1.0.1 https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/iamzeus14/Nirwana-Music.git .
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_ENV
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      # 3. Send Trigger Notification
      - name: Send Trigger Notification
        run: |
          TIME=$(date +"%a %b %d %I:%M:%S %p")
          
          # We wrap everything in <pre> to force the Monospace (JetBrains style) font
          CAPTION=$(printf "<code>Build Triggered ⌛\nApp     : Nirwana Music\nSupport : Android 16.0\nVariant : Released\nMachine : Ubuntu 24.04.3 LTS\nCores   : 4\nTime    : $TIME\nCommit  : ${{ env.COMMIT_SHA }} ${{ env.COMMIT_MSG }}</code>")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 4. Prepare Gradle
      - name: Prepare Gradle
        run: |
          if [ ! -f gradlew ]; then gradle wrapper; fi
          chmod +x gradlew

      # 5. Build the Music App
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      # 6. Handle Success (GoFile Upload)
      - name: Handle Success
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          
          # Fetching GoFile server for upload
          SERVER=$(curl -s https://api.gofile.io/getServer | jq -r '.data.server')
          UPLOAD_RESPONSE=$(curl -F "file=@$APK_PATH" "https://$SERVER.gofile.io/uploadFile")
          DOWNLOAD_URL=$(echo $UPLOAD_RESPONSE | jq -r '.data.downloadPage')
          
          NOW=$(date +%s)
          DIFF=$(( NOW - ${{ env.START_TIME }} ))
          
          CAPTION=$(printf "<code>Build Completed ✅\n\nApp      : Nirwana Music\nFile     : $APK_NAME\nSize     : 86.5 MB\nDuration : $(( DIFF / 60 ))m $(( DIFF % 60 ))s\nVariant  : Released\n\nDownload Link :\n$DOWNLOAD_URL</code>")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 7. Handle Failure
      - name: Handle Failure
        if: failure()
        run: |
          [ -f build_log.txt ] && tail -n 200 build_log.txt > error_trace.txt || echo "Build failed." > error_trace.txt
          
          CAPTION=$(printf "<b>Nirwana Music Build Failed</b>\n\n<b>Commit:</b> <code>${{ env.COMMIT_SHA }}</code>\n<i>Last 200 log lines attached</i>")

          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F document=@"error_trace.txt" \
               -F parse_mode="HTML" \
               -F caption="$CAPTION" \
               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"

      # 8. Final Purge
      - name: Purge Workspace
        if: always()
        run: |
          rm -rf ./*
          rm -rf .git
