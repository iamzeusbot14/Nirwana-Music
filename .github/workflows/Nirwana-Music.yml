name: Nirwana Music CI/CD

on:
  push:
    branches: [ "1.0.1" ]
  workflow_dispatch:

jobs:
  build_and_cleanup:
    name: Build and Deliver
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clone Nirwana-Music
        run: |
          git clone --depth 1 --branch 1.0.1 https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/iamzeus14/Nirwana-Music.git .

      # NEW: Build Triggered Notification
      - name: Send Trigger Notification
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          TIME=$(date +"%a %b %d %I:%M:%S %p")
          
          MESSAGE="Build Triggered ⌛%0A"
          MESSAGE+="App : Nirwana Music%0A"
          MESSAGE+="Support : Android 14.0+%0A"
          MESSAGE+="Variant : Debug Stable%0A"
          MESSAGE+="Machine : Ubuntu 24.04 LTS%0A"
          MESSAGE+="Cores : 4%0A"
          MESSAGE+="Time : $TIME%0A"
          MESSAGE+="Top Commit : $COMMIT_HASH $COMMIT_MSG"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$MESSAGE"

      - name: Prepare Gradle
        run: |
          if [ ! -f gradlew ]; then gradle wrapper; fi
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      - name: Upload and Send Link to Telegram
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          
          # Upload to transfer.sh to bypass the 50MB Telegram limit
          DOWNLOAD_URL=$(curl --upload-file "$APK_PATH" "https://transfer.sh/$APK_NAME")
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="✅ *Build Completed*%0A%0A📦 *File:* $APK_NAME%0A🔗 *Download:* $DOWNLOAD_URL" \
          -d parse_mode="Markdown"

      - name: Send Error Log on Failure
        if: failure()
        run: |
          [ -f build_log.txt ] && tail -n 200 build_log.txt > error_log.txt || echo "Failed early." > error_log.txt
          curl -F document=@"error_log.txt" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F caption="❌ *Build Failed on 1.0.1*" \
          -F parse_mode="Markdown"

      - name: Purge Workspace
        if: always()
        run: |
          rm -rf ./*
          rm -rf .git
