name: Nirwana Music CI/CD

on:
  push:
    branches: [ "1.0.1" ]
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build_and_cleanup:
    name: Build and Purge
    runs-on: ubuntu-latest

    steps:
      # 1. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Cache Gradle (⚡ faster builds)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      # 3. Checkout PRIVATE repo (✅ FIXED)
      - name: Checkout Nirwana-Music
        uses: actions/checkout@v4
        with:
          repository: iamzeus14/Nirwana-Music
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: 1.0.1

      # 4. Extract Git Info
      - name: Get Commit Info
        run: |
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_ENV
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      # 5. Send Start Notification
      - name: Send Trigger Notification
        run: |
          TIME=$(date +"%a %b %d %I:%M:%S %p")
          
          CAPTION=$(printf "<b>Build Triggered ⌛</b>\n<b>App :</b> <code>Nirwana Music</code>\n<b>Support :</b> <code>Android 16</code>\n<b>Variant :</b> <code>Debug</code>\n<b>Time :</b> <code>$TIME</code>\n<b>Commit :</b> <code>${{ env.COMMIT_SHA }}</code>\n<b>Msg :</b> <code>${{ env.COMMIT_MSG }}</code>")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 6. Prepare Gradle
      - name: Prepare Gradle
        run: |
          if [ ! -f gradlew ]; then gradle wrapper; fi
          chmod +x gradlew

      # 7. Build APK
      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_log.txt

      # 8. On Success ✅
      - name: Handle Success
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          APK_NAME=$(basename "$APK_PATH")

          echo "🌐 Getting upload server..."
          SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[0].name // "store1"')

          echo "📤 Uploading APK..."
          RESPONSE=$(curl -F "file=@$APK_PATH" "https://$SERVER.gofile.io/contents/uploadfile")
          DOWNLOAD_URL=$(echo $RESPONSE | jq -r '.data.downloadPage // "Upload Error"')

          NOW=$(date +%s)
          DIFF=$(( NOW - ${{ env.START_TIME }} ))

          CAPTION=$(printf "<b>Build Completed ✅</b>\n\n<b>File :</b> <code>$APK_NAME</code>\n<b>Time :</b> <code>$(( DIFF / 60 ))m $(( DIFF % 60 ))s</code>\n\n<b>Download :</b>\n$DOWNLOAD_URL")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$CAPTION" \
          -d parse_mode="HTML"

      # 9. On Failure ❌
      - name: Handle Failure
        if: failure()
        run: |
          [ -f build_log.txt ] && tail -n 200 build_log.txt > error.txt || echo "Build failed" > error.txt

          CAPTION=$(printf "<b>Build Failed ❌</b>\n\n<b>Commit:</b> <code>${{ env.COMMIT_SHA }}</code>")

          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F document=@"error.txt" \
               -F caption="$CAPTION" \
               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"

      # 10. Cleanup
      - name: Cleanup
        if: always()
        run: |
          rm -rf ./*
          rm -rf .git